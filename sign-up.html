<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concerta Sign Up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="navbar">
    <div class="logo"> <img src="images/icon.png" alt="logo-concerta"></div>
    <nav>
      <a href="#">Home</a>
      <a href="#">History</a>
      <a href="#">About Us</a>
    </nav>
    <div class="auth-buttons">
      <button class="btn-outline">Sign In</button>
      <button class="btn-primary">Sign Up</button>
    </div>
  </header>

  <main class="container">
    <div class="card">
      <div class="form-section">
        <h2>Create Your Account</h2>

        <input type="email" placeholder="Email">
        <input type="text" placeholder="Name">
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <input type="password" placeholder="Confirm Password">

        <button class="signup-btn">SIGN UP</button>

        <p class="login-text">Already have an account? <a href="#"><b>Sign In here</b></a></p>
      </div>

      <div class="image-section">
        <img src="images/pist-login.png" alt="concert">
      </div>

    </div>
  </main>

  <footer class="footer">
    <p>Copyrights © Concerta. All rights reserved.</p>
  </footer>

</body>
</html
